<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피그마따라코딩</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <section class="main_product">
        <div class="title">
            <h2>겨울이 물러난 자리에 연한 바람 하나 내려앉는다. </h2>
            <p>굳어 있던 나뭇가지 끝에서 작은 초록이 조심스레 고개를 들고, 햇살은 길어진 오후를 따라 천천히 골목을 밝힌다. 말없이 지나가던 계절 속에서 어느새 세상은 다시 부드러운 색으로 피어난다.
            </p>
        </div>

        <div class="inner">

            <div class="itm">
                <img src="./images/img01.jpg" alt="피그마따라코딩">
                <div class="txt_box">
                    <strong>꽃은 먼저 피어버린다.</strong>
                    <p>겨울이 남겨 둔 침묵 위로 분홍빛 시간이 조용히 번진다.</p>
                </div>
            </div>

            <div class="itm">
                <img src="./images/img02.jpg" alt="피그마따라코딩">
                <div class="txt_box">
                    <strong>길가의 나무들은 어제보다 조금 더 푸르다.</strong>
                    <p>아무도 눈치채지 못하는 사이 봄은 그렇게 커지고 있다.</p>
                </div>
            </div>

            <div class="itm">
                <img src="./images/img03.jpg" alt="피그마따라코딩">
                <div class="txt_box">
                    <strong>겨울의 끝에서 땅은 천천히 숨을 고르고,</strong>
                    <p>그 위로 연둣빛 하루가 조용히 올라온다.</p>
                </div>
            </div>

        </div>

    </section>

</body>

</html>
